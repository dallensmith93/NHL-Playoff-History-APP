<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Puck">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#152028"/>
      <stop offset="100%" stop-color="#0a1016"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e5e68"/>
      <stop offset="50%" stop-color="#303038"/>
      <stop offset="100%" stop-color="#505058"/>
